name: RzKredit APK Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Mengambil Kode dari GitHub
      uses: actions/checkout@v4

    - name: 2. Menyiapkan Mesin Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Install Gradle 8.7 & Rakit APK
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'
        arguments: assembleDebug

    - name: 4. Menyimpan Hasil Mentahan APK
      uses: actions/upload-artifact@v4
      with:
        name: RzKredit-App-Terbaru
        path: app/build/outputs/apk/debug/app-debug.apk
