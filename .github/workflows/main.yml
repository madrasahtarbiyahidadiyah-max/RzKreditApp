name: RzKredit APK Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Mengambil Kode dari GitHub
      uses: actions/checkout@v4

    - name: 2. Menyiapkan Mesin Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # --- INI DIA ROTI LAPIS PENYELAMATNYA (Membuat Keystore Dadakan) ---
    - name: 3. Mencetak Stempel Digital (debug.keystore)
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: 4. Install Gradle 9.3.1 & Rakit APK
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'
        arguments: assembleDebug

    - name: 5. Menyimpan Hasil Mentahan APK
      uses: actions/upload-artifact@v4
      with:
        name: RzKredit-App-Terbaru
        path: app/build/outputs/apk/debug/app-debug.apk
